<!DOCTYPE html>
<html>

<head>
    <title>Exam Poster</title>
    <style>
        body {
            background: burlywood;
            font-family: Cambria, Cochin, Georgia, Times, 'Times New Roman', serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }

        .poster {
            background: gray;
            border: 6px solid #ffa000;
            padding: 50px;
            width: 350px;
            text-align: center;
            border-radius: 65px;
            box-shadow: 60px 80px 20px rgba(185, 53, 53, 0.3);
        }

        .poster h1 {
            color: #ff6f00;
            font-size: 30px;
            margin-bottom: 15px;
            text-transform: uppercase;
            font-style: normal;
        }

        .poster p {
            font-size: 18px;
            color: #070707;
            line-height: 1.6;
            font-style: italic;
        }
    </style>
</head>

<body>

    <div class="poster">
        <h1>🔥 Stay Focused!</h1>
        <p><b>"Push yourself, because no one else is going to do it for you."</b></p>
    </div>

</body>

</html>
