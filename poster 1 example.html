<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        body{
            background-color: #1e1e1e;
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: monospace
            height: 100vh;
        }
        .poster{
            background-color: #2d2d2d;
            text-align: center;
            padding: 30px;
            
            border: 3px dashed rgb(40, 199, 40);
            border-radius: 10px;
            box-shadow: 0 0 20px rgb(54, 228, 54);
            width: 400px;

        }
        .poster h1{
            color: rgb(59, 199, 59);
            font-size: 24px;
            margin-bottom: 15px;
            font-style: normal;
        }
        .poster p{
            color: white;
           
           
            font-size: 18px;

        }
    </style>
</head>
<body>
    <div class="poster">
        <h1>💻 <b> Debugging Mood </b></h1>
        <p>"I don't always test my code... but when I do, I do it in production"</p>

    </div>
    
</body>
</html>
